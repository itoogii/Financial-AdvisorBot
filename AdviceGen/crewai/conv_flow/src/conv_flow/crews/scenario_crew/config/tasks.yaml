scenario_task:
  description: >
    Using the provided user personas, design engaging conversation scenarios for the user in triggering situations that affects the user personas goals. Each scenario should reflect realistic user interactions based on the characteristics and details of the personas. Ensure that the scenarios include diverse conditions to cover wide range of user inquiries. Create 1000 different realistic conversation scenarios from the user personas provided. If using the same persona in multiple scenarios, ensure their past conversation summary is included in history field to reflect their prior interactions in new scenarios. Make sure the scenarios are thorough and complete, as your next team member will depend on receiving complete, properly formatted document from you. 
  agent: scenario_planner
  expected_output: ScenarioList

scenario_review_task:
  description: >
    Review and refine the conversational scenarios from the content designer to ensure the scenarios are diverse, engaging, realistic, and can effectively trigger user interactions with the stock investment advisor. Make sure the scenarios accurately reflect realistic user interactions based on the user personas, their specific needs, interests and situations affected by diverse market conditions or events that happened in their lives. Correct and refine the conversation scenarios to ensure they are clear, coherent, and realistic.
    CRITICAL REQUIREMENTS:
    - Create exactly 1000 complete, unique conversation scenarios
    - Each scenario must have all required fields filled out completely
    - Output must be in valid JSON format matching the ScenarioList model
    - Do not expect follow-up requests to complete remaining scenarios. 
    - Complete the entire list of 1000 conversation scenarios in single output
  expected_output: >
    An improved, polished version of the conversation scenarios that maintains original structure but enhances clarity, accuracy, and consistency. Make sure the output is complete and contains all relevant information. 
  agent: scenario_reviewer
  context: 
    - scenario_task
  output_pydantic: ScenarioList
  output_file: conversation_scenarios.json