scenario_task:
  description: >
    Using the provided {user_persona} data from UX crew, design engaging 10 to 20 conversation scenarios to chat with stock investment financial advisor. Each scenario should reflect realistic triggering events that to seek for financial advisory services based on the characteristics and situations of the persona. Ensure that the scenarios include diverse conditions to cover wide range of user inquiries. Ensure their persona's mood is reflected based on the scenarios defined by you. Ensure their previous conversation summaries are included in the history field to reflect their prior interactions if it is continuing the conversation to serve as a memory. Make sure the scenarios are thorough and complete, as your next team member will depend on receiving complete, properly formatted document from you. 
  agent: content_designer
  expected_output: ScenarioList

scenario_review_task:
  description: >
    Review and refine the conversational scenarios from the content designer to ensure the scenarios are diverse, engaging, realistic, and can effectively trigger user interactions with the stock investment advisor. Make sure the scenarios accurately reflect realistic user interactions based on the {user_persona}, their specific needs, interests and situations affected by diverse market conditions or events that happened in their lives. Correct and refine the conversation scenarios to ensure they are clear, coherent, and realistic. Ensure the scenarios are practical for the user persona start chatting with the financial advisor in variuos situations. Pay close attention to the details in each scenario, make sure that the scenarios are well structured and free from ambiguities.
    CRITICAL REQUIREMENTS:
    - Produce complete, unique conversation scenarios for ALL scenarios
    - Each scenario must have all required fields filled out completely
    - Output must be in valid JSON format matching the ScenarioList model
    - Do not expect follow-up requests to complete remaining scenarios. 
    - Complete the entire list of conversation scenarios in single output
  expected_output: >
    An improved, polished version of the conversation scenarios that maintains original structure but enhances clarity, accuracy, and completeness. Make sure the output is complete and contains all relevant information. 
  agent: content_specialist
  context: 
    - scenario_task
  expected_output: >
    JSON object matching the ScenarioList pydantic model